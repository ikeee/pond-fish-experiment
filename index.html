<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>池塘里有多少条鱼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.0/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.0/dist/theme/white.css">
<style>
  .reveal .slides section {
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-color: #000;
  }
  .reveal .slides section.slide-12 {
    background-size: cover;
  }
  .reveal .slides section.video-slide {
    background-size: contain;
  }
  .slide-12-overlay {
    position: absolute;
    left: 44.2%;
    top: 53.3%;
    width: 57%;
    height: 26.7%;
    z-index: 10;
  }
  .slide-12-overlay iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }
  .video-overlay {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    max-height: 80%;
    z-index: 10;
  }
  .video-overlay video {
    width: 100%;
    height: auto;
    max-height: 70vh;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="reveal">
  <div class="slides">

    <section data-background-image="slide_01.png"></section>

    <section class="video-slide" data-background-image="slide_02.png">
      <div class="video-overlay">
        <video id="slide2-video" src="media1.mp4" controls playsinline></video>
      </div>
    </section>

    <section data-background-image="slide_03.png"></section>
    <section data-background-image="slide_04.png"></section>
    <section data-background-image="slide_05.png"></section>
    <section data-background-image="slide_06.png"></section>
    <section data-background-image="slide_07.png"></section>
    <section data-background-image="slide_08.png"></section>
    <section data-background-image="slide_09.png"></section>
    <section data-background-image="slide_10.png"></section>
    <section data-background-image="slide_11.png"></section>

    <section class="slide-12" data-background-image="slide_12.png">
      <div class="slide-12-overlay">
        <iframe src="experiment.html" allowfullscreen></iframe>
      </div>
    </section>

    <section data-background-image="slide_13.png"></section>
    <section data-background-image="slide_14.png"></section>
    <section data-background-image="slide_15.png"></section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.0/dist/reveal.js"></script>
<script>
  Reveal.initialize({
    width: 1920,
    height: 1080,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    controls: true,
    progress: true,
    center: false,
    hash: true,
    transition: 'fade',
    transitionSpeed: 'fast',
    backgroundTransition: 'fade'
  });

  // Auto-play video on slide 2 when it becomes active
  Reveal.on('slidechanged', function(event) {
    var video = document.getElementById('slide2-video');
    if (video) {
      if (event.indexh === 1) {
        video.currentTime = 0;
        video.play().catch(function() {});
      } else {
        video.pause();
      }
    }
  });
</script>
</body>
</html>
